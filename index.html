function drawTimer() {
  if (!timerStart) return;
  const elapsed = (performance.now() - timerStart) / 1000;
  const m = Math.floor(elapsed / 60);
  const s = Math.floor(elapsed % 60);
  const ms = Math.floor((elapsed % 1) * 100);
  const str = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(ms).padStart(2,'0')}`;
  ctx.save();
  ctx.font = 'bold 28px monospace';
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.textAlign = 'right';
  ctx.fillText(str, W - 16, 36);
  ctx.restore();
}

const SW = Math.ceil(W / SKY_PIXEL); // 論理幅 320
const SH = Math.ceil(H / SKY_PIXEL); // 論理高 180

function lerp(a, b, t) { return a + (b - a) * t; }

function drawSky() {
  for (let y = 0; y < SH; y++) {
    const t = y / SH;
    let r, g, b;
    if (t < 0.8) {
      const s = t / 0.8;
      r = lerp(0x3a, 0x5f, s); g = lerp(0x7b, 0xa8, s); b = lerp(0xd5, 0xe8, s);
    } else {
      const s = (t - 0.8) / 0.8;
      r = lerp(0x5f, 0xa8, s); g = lerp(0xa8, 0xd8, s); b = lerp(0xe8, 0xf8, s);
    }
    ctx.fillStyle = `rgb(${r|0},${g|0},${b|0})`;
    ctx.fillRect(0, y * SKY_PIXEL, W, SKY_PIXEL);
  }
}

    speed: 0.18 + Math.random() * 0.12,

  };
}

const clouds = [];
for (let i = 0; i < 8; i++) clouds.push(spawnCloud(Math.random() * (SW + 40) - 20));

function drawClouds() {
  for (let i = clouds.length - 1; i >= 0; i--) {
    const c = clouds[i];
    c.x -= c.speed;
    if (c.x + c.tpl.width < -5) clouds[i] = spawnCloud(SW + 2);
    ctx.globalAlpha = c.opacity;
    for (const b of c.tpl.blocks) {
      ctx.fillStyle = b.c;
      ctx.fillRect((c.x + b.x | 0) * SKY_PIXEL, (c.y + b.y | 0) * SKY_PIXEL, b.w * SKY_PIXEL, b.h * SKY_PIXEL);
    }
    ctx.globalAlpha = 1;
  }
}

// spikeCxs: 数値 or 数値の配列
function drawBubble(bx, bw, charTopY, spikeCxs, text, borderColor = '#ffffff') {
  const spikeH = 22;
  const spikeW = 18;
  const bh = 260;
  const border = 4;
  const pad = 32;
  const by = charTopY - bh - spikeH - 8;
  const spikes = Array.isArray(spikeCxs) ? spikeCxs : [spikeCxs];

  // 色枠（外側）
  ctx.fillStyle = borderColor;
  ctx.fillRect(bx - border, by - border, bw + border * 2, bh + border * 2);

  // 色枠の棘（全スピーカー分）
  for (const spikeCx of spikes) {
    ctx.beginPath();
    ctx.moveTo(spikeCx - spikeW / 2 - border, by + bh);
    ctx.lineTo(spikeCx + spikeW / 2 + border, by + bh);
    ctx.lineTo(spikeCx, by + bh + spikeH + border);
    ctx.closePath();
    ctx.fill();
  }

  // 黒ボックス
  ctx.fillStyle = '#000';
  ctx.fillRect(bx, by, bw, bh);

  // 黒の棘（全スピーカー分）
  for (const spikeCx of spikes) {
    ctx.beginPath();
    ctx.moveTo(spikeCx - spikeW / 2, by + bh);
    ctx.lineTo(spikeCx + spikeW / 2, by + bh);
    ctx.lineTo(spikeCx, by + bh + spikeH);
    ctx.closePath();
    ctx.fill();
  }

  // テキスト折り返し
  ctx.font = '44px PixelFont';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  const maxW = bw - pad * 2;
  const lineH = 56;
  // | を除去、\n で分割してから各セグメントを折り返す
  const segments = text.replace(/\|/g, '').split('\n');
  const lines = [];
  for (const seg of segments) {
    let line = '';
    for (let i = 0; i < seg.length; i++) {
      const test = line + seg[i];
      if (ctx.measureText(test).width > maxW && line.length > 0) {
        lines.push(line);
        line = seg[i];
      } else {
        line = test;
      }
    }
    lines.push(line);
  }
  const totalH = lines.length * lineH;
  const startY = by + (bh - totalH) / 2 + 44;
  const shake = 2;        // 揺れ幅（px）
  const shakeInterval = 4; // 何フレームごとにオフセットを更新するか

  if (!drawBubble.shakeOffsets) drawBubble.shakeOffsets = [];
  if (!drawBubble.shakeTimer) drawBubble.shakeTimer = 0;
  drawBubble.shakeTimer++;
  const fullText = lines.join('');
  if (drawBubble.shakeTimer >= shakeInterval || drawBubble.shakeOffsets.length !== fullText.length) {
    drawBubble.shakeTimer = 0;
    drawBubble.shakeOffsets = Array.from({ length: fullText.length }, () => [
      (Math.random() * 2 - 1) * shake,
      (Math.random() * 2 - 1) * shake,
    ]);
  }

  let globalCharIdx = 0;
  function drawShaky(str, baseX, baseY, align) {
    ctx.textAlign = 'left';
    let cx = baseX;
    if (align === 'center') cx = baseX - ctx.measureText(str).width / 2;
    for (let i = 0; i < str.length; i++) {
      const ch = str[i];
      const [dx, dy] = drawBubble.shakeOffsets[globalCharIdx++] || [0, 0];
      ctx.fillText(ch, cx + dx, baseY + dy);
      cx += ctx.measureText(ch).width;
    }
  }

  const textOffsetX = 6; // テキスト全体を右にずらす量
  if (lines.length === 1) {
    drawShaky(lines[0], bx + bw / 2 + textOffsetX, startY, 'center');
  } else {
    lines.forEach((l, i) => drawShaky(l, bx + pad + textOffsetX, startY + i * lineH, 'left'));
  }
}

const GROUND_SPEED = 2;

function drawGroundScene() {
  if (!groundImg.complete || !groundImg.naturalWidth) return;
  const iw = groundImg.naturalWidth;
  const ih = groundImg.naturalHeight;
  const dw = iw * GSCALE;
  const dh = ih * GSCALE;
  const dstY = H - dh;
  const s = ((groundScroll | 0) % dw + dw) % dw;

  ctx.imageSmoothingEnabled = false;
  // タイル描画（2枚でループ）
  ctx.drawImage(groundImg, 0, 0, iw, ih, -s, dstY, dw, dh);
  ctx.drawImage(groundImg, 0, 0, iw, ih, dw - s, dstY, dw, dh);
  // 画面幅を超えた分を補完
  if (dw - s < W) {
    ctx.drawImage(groundImg, 0, 0, iw, ih, dw * 2 - s, dstY, dw, dh);
  }

  groundScroll += GROUND_SPEED;
}

// Web Audio
let audioCtx = null;
let masterGain = null;
function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.connect(audioCtx.destination);
  }
  return audioCtx;
}

// BGM
const bgmSaki = new Audio('audio/bgm_saki.mp3');
bgmSaki.loop = true;
bgmSaki.volume = 0.3;
const bgmHashi = new Audio('audio/bgm_hashi.mp3');
bgmHashi.loop = true;
bgmHashi.volume = 0.3;
let bgmState = 'none'; // 'none' | 'saki' | 'hashi'

function switchBgm(track) {
  if (bgmState === track) return;
  if (track === 'saki') {
    bgmHashi.pause();
    bgmHashi.currentTime = 0;
    bgmSaki.currentTime = 0;
    bgmSaki.play();
    bgmState = 'saki';
  } else if (track === 'hashi') {
    bgmSaki.pause();
    bgmSaki.currentTime = 0;
    bgmHashi.currentTime = 0;
    bgmHashi.play();
    bgmState = 'hashi';
  }
}

function playTick(progress) {
  const ac = getAudioCtx();
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  osc.connect(gain);
  gain.connect(masterGain);
  // progressに応じてピッチを上げる (200Hz → 1200Hz)
  osc.frequency.value = 200 + progress * 1000;
  osc.type = 'square';
  gain.gain.setValueAtTime(0.08, ac.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.06);
  osc.start(ac.currentTime);
  osc.stop(ac.currentTime + 0.06);
}

const VOICE_PROFILES = {
  female_small: { baseFreq: 1200, spread: 300, type: 'square', gain: 0.05, dur: 0.03 },
  male_large:   { baseFreq:   90, spread:  30, type: 'square', gain: 0.12, dur: 0.09 },
  female_mid:   { baseFreq:  750, spread: 150, type: 'square', gain: 0.06, dur: 0.04 },
  male_mid:     { baseFreq:  320, spread:  80, type: 'square', gain: 0.08, dur: 0.06 },
};

function playTypePip(voice) {
  const ac = getAudioCtx();
  const p = VOICE_PROFILES[voice] || VOICE_PROFILES.female_mid;
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  osc.connect(gain);
  gain.connect(masterGain);
  osc.type = p.type;
  osc.frequency.value = p.baseFreq + Math.random() * p.spread;
  gain.gain.setValueAtTime(p.gain, ac.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + p.dur);
  osc.start(ac.currentTime);
  osc.stop(ac.currentTime + p.dur);
}

function playBurst() {
  const ac = getAudioCtx();
  // 低音ドン
  const noise = ac.createOscillator();
  const ng = ac.createGain();
  noise.connect(ng); ng.connect(masterGain);
  noise.type = 'square';
  noise.frequency.setValueAtTime(80, ac.currentTime);
  noise.frequency.exponentialRampToValueAtTime(30, ac.currentTime + 0.15);
  ng.gain.setValueAtTime(0.4, ac.currentTime);
  ng.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.2);
  noise.start(ac.currentTime); noise.stop(ac.currentTime + 0.2);
  // 高音シャン
  [880, 1320, 1760].forEach((freq, i) => {
    const osc = ac.createOscillator();
    const g = ac.createGain();
    osc.connect(g); g.connect(masterGain);
    osc.type = 'square';
    osc.frequency.value = freq;
    const t = ac.currentTime + i * 0.03;
    g.gain.setValueAtTime(0.15, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    osc.start(t); osc.stop(t + 0.3);
  });
}

function playPoink() {
  const ac = getAudioCtx();
  [0, 0.12].forEach((delay, i) => {
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain);
    gain.connect(masterGain);
    osc.type = 'sine';
    const t = ac.currentTime + delay;
    // ぽいんっ：高めから上にピッチが跳ねる
    osc.frequency.setValueAtTime(300, t);
    osc.frequency.exponentialRampToValueAtTime(900, t + 0.08);
    osc.frequency.exponentialRampToValueAtTime(600, t + 0.18);
    gain.gain.setValueAtTime(0.25, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
    osc.start(t);
    osc.stop(t + 0.25);
  });
}

function playComplete() {
  const ac = getAudioCtx();

    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    osc.start(t);
    osc.stop(t + 0.3);
  });
}

function playTvOff() {
  const ac = getAudioCtx();

}

function initJktCloud() {
  jktCloudBlocks = [];
  jktBaseBlocks = [];
  const P = SKY_PIXEL;
  const pw = Math.ceil(JKT_SIZE / P);
  const ph = Math.ceil(JKT_SIZE / P);
  const pad = 10;      // 画像の外側に広げる雲のマージン（論理ピクセル）
  const bottomPad = 10; // 上下左右と同じマージン
  const cw = pw + pad * 2;
  const ch = ph + pad + bottomPad;
  const rnd = (a, b) => a + Math.floor(Math.random() * (b - a + 1));
  const cols = [CLOUD_L, CLOUD_L, CLOUD_M, CLOUD_S];

  // ベース層（CLOUD_M）：テキスト含む全体を覆う
  for (let y = -pad; y < ph + bottomPad;) {
    const h = rnd(4, 8);
    for (let x = -pad; x < pw + pad;) {
      const w = rnd(5, 12);
      jktCloudBlocks.push({ x, y, w, h, col: CLOUD_M });
      x += w;
    }
    y += h;
  }
  // ハイライト層（CLOUD_L）：上寄りに散布
  for (let i = 0; i < cw * 2; i++) {
    const x = rnd(-pad, pw + pad - 4);
    const y = rnd(-pad, (ph + pad) * 0.6 | 0);
    const w = rnd(4, 10); const h = rnd(3, 7);
    jktCloudBlocks.push({ x, y, w, h, col: CLOUD_L });
  }
  // シャドウ層（CLOUD_S）：下寄りに散布
  for (let i = 0; i < cw; i++) {
    const x = rnd(-pad, pw + pad - 2);
    const y = rnd((ph + pad) * 0.8 | 0, ph + bottomPad + 2);
    const w = rnd(3, 8); const h = rnd(2, 5);
    jktCloudBlocks.push({ x, y, w, h, col: CLOUD_S });
  }
  // 外周ボーダー：なだらかな輪郭
  const bumpH = 3;
  for (let x = -pad - 2; x < pw + pad + 2;) {
    const w = rnd(4, 9); const h = rnd(1, bumpH + 1);
    jktCloudBlocks.push({ x, y: -pad - h, w, h, col: cols[rnd(0, 1)] });
    jktCloudBlocks.push({ x, y: ph + bottomPad, w, h, col: cols[rnd(0, 2)] });
    x += w;
  }
  for (let y = -pad - 2; y < ph + bottomPad + 2;) {
    const w = rnd(1, bumpH + 1); const h = rnd(4, 9);
    jktCloudBlocks.push({ x: -pad - w, y, w, h, col: cols[rnd(0, 2)] });
    jktCloudBlocks.push({ x: pw + pad,  y, w, h, col: cols[rnd(0, 2)] });
    y += h;
  }

  // 台座雲：画像と同じ幅で下に伸びる
  for (let x = 0; x < pw;) {
    const w = rnd(4, 9);
    const topY = ph - rnd(0, 2);
    const h = rnd(5, 10);
    jktBaseBlocks.push({ x, y: topY, w, h, col: cols[rnd(0, cols.length - 1)] });
    x += w;
  }
}

const PLANE_SPEED = 8;

let planeStates = PLANE_CONFIGS.map(cfg => ({
  text: cfg.text, y: cfg.y, x: -150, done: false,
  contrailRevealedX: -Infinity, started: false,
}));

function drawPlaneScene() {
  if (!planesActive) return;
  planeTimer++;
  const s = 5;

  planeStates.forEach((plane, i) => {
    if (planeTimer < i * PLANE_STAGGER) return;
    if (!plane.started) { plane.started = true; plane.x = -150; }

    const py = plane.y;

    // 飛行機雲テキスト：一度表示したら消さない
    ctx.font = CONTRAIL_FONT;
    ctx.textAlign = 'left';
    ctx.fillStyle = '#ffffff';
    let cx = CONTRAIL_START_X;
    for (let j = 0; j < plane.text.length; j++) {
      const ch = plane.text[j];
      const cw = ctx.measureText(ch).width;
      const charRight = cx + cw;
      if (charRight < plane.x - s * 4) {
        plane.contrailRevealedX = Math.max(plane.contrailRevealedX, charRight);
        ctx.globalAlpha = 1;
        ctx.fillText(ch, cx, py + 45);
      }
      cx += cw;
    }
    ctx.globalAlpha = 1;

    if (!plane.done) {
      plane.x += PLANE_SPEED;
      if (plane.x > W + 150) { plane.done = true; return; }

      // 飛行機本体（右向き）
      const px = plane.x;
      ctx.fillStyle = '#f0f4ff';
      ctx.fillRect(px - s * 3, py - s, s * 13, s * 2);
      ctx.fillRect(px + s, py - s * 3, s * 5, s * 6);
      ctx.fillRect(px - s * 3, py - s * 4, s * 2, s * 4);
      ctx.fillRect(px - s * 3, py + s, s * 4, s);
      ctx.fillStyle = '#d8e8ff';
      ctx.fillRect(px + s * 9, py - s + 2, s * 2, s * 2 - 4);
    }
  });
}

// Sparkle particles
const sparkles = [];
const floats = [];
function spawnSparkles(x, y, h) {
  for (let i = 0; i < 3; i++) {
    sparkles.push({
      x: x + (Math.random() - 0.5) * 6,
      y: y + Math.random() * h,
      vx: (Math.random() - 0.5) * 3,
      vy: (Math.random() - 1.2) * 3,
      life: 1,
      size: 2 + Math.random() * 4,
      color: ['#ffffff', '#ffffcc', '#ffeeee', '#eeeeff', '#ccffff'][Math.floor(Math.random() * 5)],
    });
  }
}

function spawnFloat(x, y) {
  floats.push({
    x,
    y,
    vx: (Math.random() - 0.5) * 0.4,
    vy: -(0.3 + Math.random() * 0.4),
    life: 1,
    size: 1 + Math.floor(Math.random() * 3),
    color: ['#ffffff', '#ffffcc', '#ccffff', '#ffccff'][Math.floor(Math.random() * 4)],
  });
}

function updateSparkles() {
  for (let i = sparkles.length - 1; i >= 0; i--) {
    const s = sparkles[i];
    s.x += s.vx;
    s.y += s.vy;
    s.vy += 0.15;
    s.life -= 0.04;
    if (s.life <= 0) sparkles.splice(i, 1);
  }
}

function drawSparkles() {
  for (const s of sparkles) {
    ctx.save();
    ctx.globalAlpha = s.life;
    ctx.fillStyle = s.color;
    const sz = Math.ceil(s.size);
    ctx.fillRect(Math.floor(s.x - sz / 2), Math.floor(s.y - 1), sz, 2);
    ctx.fillRect(Math.floor(s.x - 1), Math.floor(s.y - sz / 2), 2, sz);
    ctx.restore();
  }
  for (const f of floats) {
    ctx.save();
    ctx.globalAlpha = f.life * 0.8;
    ctx.fillStyle = f.color;
    const sz = f.size;
    ctx.fillRect(Math.floor(f.x), Math.floor(f.y), sz, sz);
    ctx.restore();
  }
}

function updateFloats() {
  for (let i = floats.length - 1; i >= 0; i--) {
    const f = floats[i];
    f.x += f.vx;
    f.y += f.vy;
    f.life -= 0.008;
    if (f.life <= 0) floats.splice(i, 1);
  }
}

function loop(ts) {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  // Text
  blinkTimer++;
  const LS = 1.5; // ローディング画面スケール
  ctx.font = `${20 * LS | 0}px PixelFont`;
  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  const blinkOn = Math.floor(blinkTimer / 20) % 2 === 0;
  if (phase === 'loading') {
    if (blinkOn) ctx.fillText('NOW LOADING', W / 2, H / 2);
    // 点滅で消えているタイミングで切り替え
    if (done && doneTimer > DONE_WAIT && !blinkOn) phase = 'ready';
  } else if (phase === 'ready') {
    ctx.fillText('READY?', W / 2, H / 2);
  } else if (phase === 'confirm') {
    if (Math.floor(phaseTimer / 5) % 2 === 0) {
      ctx.fillText('READY?', W / 2, H / 2);
    }
  }

  if (phase === 'loading' || phase === 'ready' || phase === 'confirm') {
    // Progress bar dims
    const barW = 160 * LS | 0;
    const barH = 20 * LS | 0;
    const barX = (W - barW) / 2;
    const barY = H / 2 + 130 * LS;

    // Duck walk animation
    duckFrameTimer++;
    if (duckFrameTimer > 12) { duckFrame = (duckFrame + 1) % 2; duckFrameTimer = 0; }

    duckCycleTimer = (duckCycleTimer + 1) % DUCK_CYCLE;
    const duckDW = DUCK_W * DUCK_SCALE * LS | 0;
    const duckDH = DUCK_H * DUCK_SCALE * LS | 0;
    const duckBaseY = H / 2 + 32 * LS;
    const duckTravelH = duckDH * 0.65;
    const t = duckCycleTimer / DUCK_CYCLE;
    let duckVisible = true;
    if (t < 0.2) {
      duckOffsetY = (t / 0.2 - 1) * duckTravelH;
    } else if (t < 0.75) {
      duckOffsetY = 0;
    } else if (t < 0.95) {
      duckOffsetY = ((t - 0.75) / 0.2) * duckTravelH;
    } else {
      duckVisible = false;
    }

    const duckX = W / 2 - duckDW / 2;
    const duckY = duckBaseY + duckOffsetY;
    if (duckVisible) {
      ctx.save();
      ctx.beginPath();
      const clipBottom = H / 2 + 32 * LS + duckDH;
      ctx.rect(duckX - 4, 0, duckDW + 8, clipBottom);
      ctx.clip();
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(duckImg, duckFrame * DUCK_W, 0, DUCK_W, DUCK_H, duckX, duckY, duckDW, duckDH);
      ctx.restore();
    }

    // Percent label
    const pct = Math.floor(progress * 100);
    ctx.font = `${20 * LS | 0}px PixelFont`;
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.fillText(pct + '%', barX + barW / 2, barY + barH + 36 * LS);

    // Rainbow fill
    const fillW = Math.floor(barW * progress);
    if (fillW > 0) {
      const sliceW = 4;
      for (let i = 0; i < fillW; i += sliceW) {
        const t = blinkTimer * 0.5;
        const wave = Math.sin((i / barW) * Math.PI * 3 - t * 0.08) * 20;
        const hue = ((i / barW) * 360 - t * 1.2 + wave) % 360;
        ctx.fillStyle = `hsl(${hue}, 100%, 55%)`;
        ctx.fillRect(barX + i, barY, Math.min(sliceW, fillW - i), barH);
      }
    }

    // Sparkles
    updateSparkles();
    updateFloats();
    if (fillW > 0 && !done) spawnSparkles(barX + fillW, barY, barH);
    drawSparkles();
  }

  // Advance progress（有機的な速度変化）
  if (!done) {
    const wave = Math.sin(blinkTimer * 0.04) * 0.0015;
    const stutter = Math.random() < 0.03 ? 0 : 1;
    progress += (0.008 + wave) * stutter;
    if (progress >= 1) {
      progress = 1;
      done = true;
      if (!completePlayed) {
        completePlayed = true;
        playComplete();
        phase = 'ready'; // SEと同時にREADYへ
        phaseTimer = 0;
      }
    }
    // 一定間隔でtick音
    tickCounter++;
    if (tickCounter % 6 === 0 && audioCtx) playTick(progress);
  }
  if (done) doneTimer++;

  // フェーズ遷移
  if (phase === 'ready') {
    phaseTimer++;
    if (phaseTimer > READY_WAIT) {
      phase = 'confirm';
      phaseTimer = 0;
      playPoink();
    }
  }
  if (phase === 'confirm') {
    phaseTimer++;
    if (phaseTimer >= CONFIRM_FRAMES) {
      phase = 'white';
    }
  }
  if (phase === 'white') {
    // switchBgm('saki'); // 停止中
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, W, H);

    // タイプライター進行
    typeTimer++;
    if (typeTimer > TYPE_WAIT) {
      const nextChar = ALL_CHARS[typeChars];
      if (nextChar === PAUSE_CHAR) {
        // ポーズ中
        pauseTimer++;
        if (pauseTimer >= PAUSE_FRAMES) {
          typeChars++;
          pauseTimer = 0;
        }
      } else if (typeTimer % TYPE_SPEED === 0 && typeChars < TOTAL_CHARS) {
        typeChars++;
        if (ALL_CHARS[typeChars - 1] !== PAUSE_CHAR) playTypePip();
      }
    }

    // テキスト描画（|を除いて表示）
    ctx.font = '44px PixelFont';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#000';
    const lineH = 52;
    const startY = H / 2 - lineH / 2;
    let remaining = typeChars;
    LINES.forEach((line, i) => {
      const slice = line.slice(0, Math.min(remaining, line.length));
      remaining = Math.max(0, remaining - line.length);
      ctx.fillText(slice.replace(/\|/g, ''), W / 2, startY + i * lineH);
    });

    // テキスト全表示後、しばらくしたら空へ遷移
    if (typeChars >= TOTAL_CHARS) {
      typeTimer += 0; // typeTimerは継続カウント中
      if (typeTimer > TYPE_WAIT + TOTAL_CHARS * TYPE_SPEED + 180) {
        phase = 'sky_fade';
        phaseTimer = 0;
      }
    }
  }

  if (phase === 'sky_fade' || phase === 'sky') {
    drawSky();
    drawClouds();
    drawPlaneScene();
    drawGroundScene();

    // キャラクター足踏みアニメ（左下に4体並べる）
    charFrameTimer++;
    if (charFrameTimer > 15) { charFrame = (charFrame + 1) % 2; charFrameTimer = 0; }
    const cW = CHAR_W * CHAR_SCALE * 2 | 0;
    const cH = CHAR_H * CHAR_SCALE * 2 | 0;
    const cY = H - 40 * GSCALE - cH + 200; // 地面と重なる位置
    const gap = cW + 12;
    const startX = 140;
    ctx.imageSmoothingEnabled = false;
    const charOrder = [2,3,1,4];
    charOrder.map(n => charImgs[n-1]).forEach((img, i) => {
      ctx.drawImage(img, charFrame * CHAR_W, 0, CHAR_W, CHAR_H, startX + i * gap, cY, cW, cH);
    });


    // 吹き出し描画
    if (dialogueIdx >= 0 && dialogueIdx < DIALOGUE.length && bubbleScale > 0.01) {
      const cur = DIALOGUE[dialogueIdx];
      const spikeCxs = cur.multiSpeaker
        ? cur.multiSpeaker.map(idx => startX + idx * gap + cW / 2)
        : startX + cur.speakerIdx * gap + cW / 2;
      const bubbleLeft = startX - 10;
      const bw = 640;
      const bx = bubbleLeft;
      const pivotX = bx + bw / 2;
      ctx.save();
      ctx.translate(pivotX, cY);
      ctx.scale(bubbleScale, bubbleScale);
      ctx.translate(-pivotX, -cY);
      drawBubble(bx, bw, cY, spikeCxs, cur.text.slice(0, bubbleChars), cur.border);
      ctx.restore();
    }

    // JKT描画（雲フレーム＋台座付き）
    if (jktActive && jktImg.complete) {
      if (jktX > JKT_STOP_X) jktX -= JKT_SPEED;
      // JKT到着後に飛行機3台を発進
      if (!planesActive && jktX <= JKT_STOP_X) {
        planesActive = true; planeTimer = 0;
        planeStates.forEach(p => { p.x = -150; p.done = false; p.contrailRevealedX = -Infinity; p.started = false; });
      }
      const jktY = H * 0.17;
      const iw = JKT_SIZE;
      const P = SKY_PIXEL;

      // 雲ブロック（x=0,y=0が画像の左上に対応、負の座標が画像の外に広がる）
      for (const b of jktBaseBlocks) {
        ctx.fillStyle = b.col;
        ctx.fillRect(jktX + b.x * P, jktY + b.y * P, b.w * P, b.h * P);
      }
      for (const b of jktCloudBlocks) {
        ctx.fillStyle = b.col;
        ctx.fillRect(jktX + b.x * P, jktY + b.y * P, b.w * P, b.h * P);
      }

      // JKT画像＋テキスト（雲内で少し下にオフセット）
      const imgOffsetY = -10; // 雲基準の上下オフセット（負=上、正=下）
      const imgY = jktY + imgOffsetY;
      ctx.save();
      ctx.beginPath();
      ctx.rect(jktX, imgY, iw, iw);
      ctx.clip();
      ctx.imageSmoothingEnabled = true;
      ctx.drawImage(jktImg, jktX, imgY, iw, iw);
      ctx.restore();

    }

    if (phase === 'sky_fade') {
      phaseTimer++;
      if (phaseTimer === 1) { switchBgm('hashi'); initFadeCircles(); }
      const t = phaseTimer / SKY_FADE_FRAMES;
      bgmSaki.volume = Math.max(0, 0.3 * (1 - t));

      if (FADE_STYLE === 'circle') {
        // 中心から1つの円が広がって白を切り抜く（ぽちゃん）
        const ease = 1 - Math.pow(1 - t, 2.5);
        const maxR = Math.sqrt(W * W + H * H) / 2 * 1.05;
        const cr = ease * maxR;
        wctx.clearRect(0, 0, W, H);
        wctx.fillStyle = '#fff';
        wctx.fillRect(0, 0, W, H);
        wctx.globalCompositeOperation = 'destination-out';
        wctx.beginPath();
        wctx.arc(W / 2, H / 2, cr, 0, Math.PI * 2);
        wctx.fill();
        wctx.globalCompositeOperation = 'source-over';
        ctx.drawImage(whiteCanvas, 0, 0);
      } else if (FADE_STYLE === 'tv') {
        // テレビのように縦に縮んで線になって消える
        const ease = Math.pow(1 - t, 2.2); // ease-in: 最後に急速に縮む
        const h = ease * H;
        const w = h < 20 ? (h / 20) * W : W; // 最後だけ横も縮む
        ctx.fillStyle = '#fff';
        ctx.fillRect(W / 2 - w / 2, H / 2 - h / 2, w, h);
      }

      if (t >= 1) {
        phase = 'sky';
        skyTimer = 0;
      }
    }

    if (phase === 'sky') {
      skyTimer++;

      // 吹き出しダイアログ進行
      if (skyTimer >= BUBBLE_DELAY) {
        if (dialogueIdx === -1) {
          dialogueIdx = 0;
          bubbleChars = 0;
          bubbleTypeTimer = 0;
          bubbleWaitTimer = 0;
        }
        if (dialogueIdx < DIALOGUE.length) {
          const cur = DIALOGUE[dialogueIdx];
          // [4]えっとが始まったら即JKTを流し始める
          if (!jktActive && dialogueIdx === 3) {
            jktActive = true; jktX = W + 100; initJktCloud();
          }
          if (!bubbleClosing) {
            if (bubbleScale < BUBBLE_TYPE_DELAY) {
              // ウィンドウが開くまでタイプ待機
            } else if (bubbleChars < cur.text.length) {
              const nextChar = cur.text[bubbleChars];
              if (nextChar === '|') {
                bubblePauseTimer++;
                if (bubblePauseTimer >= BUBBLE_PAUSE_FRAMES) { bubbleChars++; bubblePauseTimer = 0; }
              } else {
                bubbleTypeTimer++;
                const spd = cur.typeSpeed || BUBBLE_TYPE_SPEED;
                if (bubbleTypeTimer % spd === 0) {
                  bubbleChars++;
                  if (nextChar !== '\n') playTypePip(cur.voice);
                }
              }
            } else {
              // タイプ完了後ウェイト
              const isLast = dialogueIdx === DIALOGUE.length - 1;
              if (isLast) {
                bubbleWaitTimer++;
                if (bubbleWaitTimer >= BUBBLE_SHOW_WAIT && !fadingToInfo1) {
                  fadingToInfo1 = true; info1FadeTimer = 0;
                }
              } else {
                bubbleWaitTimer++;
                if (bubbleWaitTimer >= BUBBLE_SHOW_WAIT) bubbleClosing = true;
              }
            }
          }
          // クローズアニメ完了で次のセリフへ（closing中はscaleが下がる）
          const nextIdx = (dialogueIdx + 1) % DIALOGUE.length;
          const nextWaitsJkt = DIALOGUE[nextIdx] && DIALOGUE[nextIdx].waitForJkt;
          if (bubbleClosing && bubbleScale < 0.01 && (!nextWaitsJkt || jktX <= JKT_STOP_X)) {
            dialogueIdx = nextIdx;
            bubbleChars = 0;
            bubbleTypeTimer = 0;
            bubbleWaitTimer = 0;
            bubblePauseTimer = 0;
            bubbleClosing = false;
            bubbleScale = 0;
            bubbleScaleVel = 0;
          }
        }
      }

      // 吹き出しスケールアニメ（スプリング）
      if (dialogueIdx >= 0) {
        if (bubbleClosing) {
          bubbleScaleVel += (0 - bubbleScale) * 0.5;
          bubbleScaleVel *= 0.5;
        } else {
          bubbleScaleVel += (1 - bubbleScale) * 0.18;
          bubbleScaleVel *= 0.6;
        }
        bubbleScale = Math.max(0, Math.min(1.5, bubbleScale + bubbleScaleVel));
        if (bubbleClosing && bubbleScale < 0.01) bubbleScale = 0;
      }

      // 録画はinfo3終了時に自動停止

      // テレビオフアニメ → info1へ
      if (fadingToInfo1) {
        if (info1FadeTimer === 0) {
          playTvOff();
          bgmHashi.pause(); bgmHashi.currentTime = 0; bgmState = 'none';
        }
        info1FadeTimer++;
        const PHASE1 = 10, PHASE2 = 6;
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, W, H);
        if (info1FadeTimer <= PHASE1) {
          // 縦に縮む
          const t = info1FadeTimer / PHASE1;
          const ease = 1 - Math.pow(1 - t, 2);
          const lineH = Math.max(2, H * (1 - ease));
          const lineW = lineH < 40 ? W * (lineH / 40) : W;
          ctx.fillStyle = '#ffffff';
          ctx.fillRect((W - lineW) / 2, (H - lineH) / 2, lineW, lineH);
        } else if (info1FadeTimer <= PHASE1 + PHASE2) {
          // ラインが消える
          const t2 = (info1FadeTimer - PHASE1) / PHASE2;
          ctx.globalAlpha = 1 - t2;
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0, H / 2 - 1, W, 2);
          ctx.globalAlpha = 1;
        } else {
          phase = 'info1'; phaseTimer = 0;
        }
      }
    }
  }

  // info1〜4フェーズ（info1→pool→info2→info3）
  if (phase === 'info1') {
    if (phaseTimer === 0) { bgmRf.play(); bgmHashi.pause(); }
    phaseTimer++;

    const F = INFO1_FADE_FRAMES;
    const H2 = INFO_SLIDE_HOLD[infoSlide];
    const XF = INFO_CROSS_FRAMES;
    const isLast = infoSlide === infoImgs.length - 1;

    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);

    function drawInfoBack(a) {
      a = Math.max(0, Math.min(1, a));
      if (infoBackImg.complete && infoBackImg.naturalWidth) {
        ctx.globalAlpha = a; ctx.drawImage(infoBackImg, 0, 0, W, H); ctx.globalAlpha = 1;
      }
    }
    function drawInfoOverlay(a) {
      a = Math.max(0, Math.min(1, a));
      if (infoTitleImg.complete && infoTitleImg.naturalWidth) {
        const dw = infoTitleImg.naturalWidth * INFO_SCALE;
        const dh = infoTitleImg.naturalHeight * INFO_SCALE;
        ctx.globalAlpha = a;
        ctx.drawImage(infoTitleImg, (W - dw) / 2, 40, dw, dh);
        ctx.globalAlpha = 1;
      }
      if (infoLogoImg.complete && infoLogoImg.naturalWidth) {
        const dw = infoLogoImg.naturalWidth * INFO_SCALE;
        const dh = infoLogoImg.naturalHeight * INFO_SCALE;
        ctx.globalAlpha = a;
        ctx.drawImage(infoLogoImg, (W - dw) / 2, H - dh - 40, dw, dh);
        ctx.globalAlpha = 1;
      }
    }
    function drawSlide(idx, alpha) {
      const img = infoImgs[idx];
      if (!img || !img.complete || img.naturalWidth === 0) return false;
      const dw = img.naturalWidth * INFO_SCALE;
      const dh = img.naturalHeight * INFO_SCALE;
      ctx.globalAlpha = Math.max(0, Math.min(1, alpha));
      ctx.drawImage(img, (W - dw) / 2, (H - dh) / 2, dw, dh);
      ctx.globalAlpha = 1;
      return true;
    }

    if (infoCrossing) {
      // クロスフェード中：back/overlay は固定、スライドコンテンツのみクロスフェード
      infoCrossTimer++;
      const t = infoCrossTimer / XF;
      drawInfoBack(1);
      drawSlide(infoPrevSlide, 1 - t);
      drawSlide(infoSlide, t);
      drawInfoOverlay(1);
      if (infoCrossTimer >= XF) {
        infoCrossing = false;
        infoSlideTimer = 0;
      }
    } else {
      infoSlideTimer++;
      let alpha = 1;
      if (infoSlide === 0) alpha = Math.min(1, infoSlideTimer / F); // info1フェードイン
      if (isLast && infoSlideTimer > H2) alpha = Math.max(0, 1 - (infoSlideTimer - H2) / F); // info3フェードアウト

      // back→コンテンツ→overlay の順で同一alphaで描画
      drawInfoBack(alpha);
      const loaded = drawSlide(infoSlide, alpha);
      if (!loaded) infoSlideTimer--;

      // info3中央にfight.mp4再生
      if (isLast) {
        if (!fightVideoStarted) { fightVideo.play(); fightVideoStarted = true; }
        if (fightVideo.readyState >= 2) {
          const vw = fightVideo.videoWidth, vh = fightVideo.videoHeight;
          const scale = Math.min(FIGHT_MAX / vw, FIGHT_MAX / vh);
          const dw = vw * scale, dh = vh * scale;
          ctx.globalAlpha = alpha;
          const fvx = (W - dw) / 2, fvy = (H - dh) / 2 + 65;
          const border = 4;
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(fvx - border, fvy - border, dw + border * 2, dh + border * 2);
          ctx.drawImage(fightVideo, fvx, fvy, dw, dh);
          ctx.globalAlpha = 1;
        }
      }

      drawInfoOverlay(alpha);

      // rf.wav音量
      bgmRf.volume = isLast && infoSlideTimer > H2
        ? Math.max(0, 1 - (infoSlideTimer - H2) / F) * 1.0
        : Math.min(1.0, phaseTimer / F * 1.0);

      // スライド切り替え判定
      if (!isLast && infoSlideTimer >= H2) {
        const trans = INFO_TRANS_OUT[infoSlide];
        infoPrevSlide = infoSlide;
        infoSlide++;
        if (trans === 'crossfade') {
          infoCrossing = true;
          infoCrossTimer = 0;
        } else {
          infoSlideTimer = 0; // cut
        }
      }
      if (isLast && infoSlideTimer >= H2 + F) {
        bgmRf.pause();
        fightVideo.pause();
        phase = 'end';
      }
    }
  }

  if (phase === 'end') {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
  }

  requestAnimationFrame(loop);
}
</script>
</body>
